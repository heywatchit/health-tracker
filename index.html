        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyCksroD7aa82WwzzdT1SaT-qmnIFinvqqQ",

  projectId: "health-tracker-5df4c",

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.orderBy = orderBy;

    </head>
<body>
    <script>
        // REPLACE your saveCondition and render logic:
        async function saveCondition() {
            const name = document.getElementById('conditionName').value.trim();
            if (!name) return;
            await addDoc(collection(window.db, "conditions"), {
                name: name,
                createdDate: new Date().toISOString(),
                entries: []
            });
            closeAddConditionModal();
        }

        // Use this to fetch data live
        window.onSnapshot(window.query(window.collection(window.db, "conditions"), window.orderBy("createdDate", "desc")), (snapshot) => {
            conditions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderConditions();
        });
    </script>
